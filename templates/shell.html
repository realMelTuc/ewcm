<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWCM — Wormhole Chain Mapper</title>
    <link rel="stylesheet" href="/static/shadowwing.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #e6e8eb; font-family: system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* ─── Left Nav ─── */
        .left-nav { width: 180px; background: #111620; border-right: 1px solid #1e2530; display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; overflow-y: auto; }
        .left-nav-brand { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: #00d4aa; padding: 16px 14px 10px; border-bottom: 1px solid #1e2530; cursor: pointer; letter-spacing: 1px; white-space: nowrap; }
        .left-nav-brand span { color: #6b7280; font-weight: 400; font-size: 11px; display: block; letter-spacing: 0; }
        .left-nav-section { padding: 6px 0; flex: 1; }
        .left-nav-link { display: block; padding: 8px 14px; color: #8892a4; font-size: 12px; cursor: pointer; text-decoration: none; transition: all 0.15s; border-left: 2px solid transparent; white-space: nowrap; }
        .left-nav-link:hover { color: #e6e8eb; background: rgba(255,255,255,0.04); }
        .left-nav-link.active { color: #e6e8eb; border-left-color: #00d4aa; background: rgba(0,212,170,0.06); }
        .left-nav-sep { height: 1px; background: #1e2530; margin: 6px 0; }
        .left-nav-label { font-size: 9px; color: #4b5563; text-transform: uppercase; letter-spacing: 1px; padding: 12px 14px 4px; }
        .left-nav-bottom { padding: 8px 0 8px; border-top: 1px solid #1e2530; flex-shrink: 0; }
        .left-nav-bottom-link { display: block; padding: 5px 14px; color: #4b5563; font-size: 11px; cursor: pointer; text-decoration: none; transition: color 0.15s; white-space: nowrap; }
        .left-nav-bottom-link:hover { color: #8892a4; }
        .nav-datetime { font-size: 10px; color: #4b5563; font-family: 'Geist Mono', monospace; line-height: 1.5; padding: 6px 14px 2px; }

        /* Alert badge in nav */
        .nav-alert { display: inline-block; background: #ef4444; color: #fff; font-size: 9px; border-radius: 8px; padding: 1px 5px; margin-left: 4px; font-family: 'Geist Mono', monospace; vertical-align: middle; }
        .nav-badge-eol { background: #f59e0b; }
        .nav-badge-crit { background: #ef4444; }

        /* ─── Main panel ─── */
        .main-panel { flex: 1; overflow-y: auto; height: 100vh; padding: 24px; min-width: 0; background: #0d1117; }
        .main-panel.no-pad { padding: 0; overflow: hidden; }
    </style>
</head>
<body>
    <nav class="left-nav">
        <div class="left-nav-brand" onclick="loadPanel('/dashboard/')">
            EWCM
            <span>Chain Mapper</span>
        </div>
        <div class="left-nav-section">
            <a class="left-nav-link" data-url="/dashboard/">Dashboard</a>
            <div class="left-nav-sep"></div>
            <div class="left-nav-label">Mapping</div>
            <a class="left-nav-link" data-url="/chain-map/">Chain Map</a>
            <a class="left-nav-link" data-url="/chains/">Chains</a>
            <div class="left-nav-sep"></div>
            <div class="left-nav-label">Data</div>
            <a class="left-nav-link" data-url="/connections/">Connections</a>
            <a class="left-nav-link" data-url="/systems/">System Registry</a>
            <div class="left-nav-sep"></div>
            <div class="left-nav-label">Records</div>
            <a class="left-nav-link" data-url="/history/">Chain History</a>
        </div>
        <div class="left-nav-bottom">
            <a class="left-nav-bottom-link" href="/" target="_self">← Home</a>
            <div class="nav-datetime" id="nav-datetime"></div>
        </div>
    </nav>

    <main class="main-panel" id="main-panel">
        <p style="color:#6b7280;text-align:center;padding:60px">Loading...</p>
    </main>

    <script>
        // ─── Panel loader ───
        function loadPanel(url) {
            // Toggle no-pad for chain-map (full canvas)
            var mp = document.getElementById('main-panel');
            if (url.startsWith('/chain-map')) {
                mp.classList.add('no-pad');
            } else {
                mp.classList.remove('no-pad');
            }

            document.querySelectorAll('[data-url]').forEach(function(el) {
                el.classList.remove('active');
                if (el.dataset.url === url || url.startsWith(el.dataset.url.replace(/\/$/, '') + '/')) {
                    el.classList.add('active');
                }
            });
            fetch(url)
                .then(function(r) {
                    if (!r.ok) throw new Error('Failed to load: ' + r.status);
                    return r.text();
                })
                .then(function(html) {
                    var tempDiv = document.createElement('div');
                    tempDiv.innerHTML = html;
                    var scripts = [];
                    tempDiv.querySelectorAll('script').forEach(function(s) {
                        scripts.push({ src: s.src, content: s.textContent });
                        s.remove();
                    });
                    document.getElementById('main-panel').innerHTML = tempDiv.innerHTML;
                    scripts.forEach(function(si) {
                        try {
                            var ns = document.createElement('script');
                            if (si.src) ns.src = si.src; else ns.textContent = si.content;
                            document.body.appendChild(ns);
                        } catch(e) { console.error('Script error:', e); }
                    });
                    history.pushState(null, '', url);
                    sessionStorage.setItem('ewcmLastPanel', url);
                })
                .catch(function(err) {
                    document.getElementById('main-panel').innerHTML =
                        '<p style="color:#ef4444;padding:40px;text-align:center">Error loading: ' + err.message + '</p>';
                });
        }

        document.querySelectorAll('[data-url]').forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                loadPanel(el.dataset.url);
            });
        });

        // ─── Initial load ───
        (function() {
            var path = window.location.pathname;
            var urlToLoad = (path && path !== '/' && path !== '/app/' && path !== '/app/index.html')
                ? path
                : (sessionStorage.getItem('ewcmLastPanel') || '/dashboard/');
            loadPanel(urlToLoad);
        })();

        // ─── EVE time (UTC) ───
        function updateNavDatetime() {
            var el = document.getElementById('nav-datetime');
            if (!el) return;
            var d = new Date().toLocaleString('en-US', { timeZone: 'UTC', month: 'short', day: 'numeric' });
            var t = new Date().toLocaleString('en-US', { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', hour12: false });
            el.innerHTML = d + '<br>' + t + ' EVE';
        }
        updateNavDatetime();
        setInterval(updateNavDatetime, 60000);

        // ─── Toast ───
        var _toastEl = null;
        window.ewcmToast = function(msg, type) {
            if (!_toastEl) {
                _toastEl = document.createElement('div');
                _toastEl.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:4px;font-size:12px;max-width:400px;transition:opacity 0.3s;pointer-events:none;font-family:system-ui';
                document.body.appendChild(_toastEl);
            }
            var colors = {
                success: ['rgba(34,197,94,0.95)', '#fff'],
                error:   ['rgba(239,68,68,0.95)',  '#fff'],
                info:    ['rgba(0,212,170,0.95)',   '#0d1117'],
                warn:    ['rgba(245,158,11,0.95)',  '#0d1117'],
            };
            var c = colors[type] || colors.info;
            _toastEl.style.background = c[0];
            _toastEl.style.color = c[1];
            _toastEl.textContent = msg;
            _toastEl.style.opacity = '1';
            clearTimeout(_toastEl._timer);
            _toastEl._timer = setTimeout(function() { _toastEl.style.opacity = '0'; }, 3500);
        };

        // ─── WH class color helper ───
        window.whClassColor = function(c) {
            var colors = {
                'C1': '#8b5cf6', 'C2': '#7c3aed', 'C3': '#6d28d9',
                'C4': '#5b21b6', 'C5': '#4c1d95', 'C6': '#2e1065',
                'HS': '#22c55e', 'LS': '#f59e0b', 'NS': '#ef4444',
                'Thera': '#00d4aa'
            };
            return colors[c] || '#6b7280';
        };

        window.massColor = function(s) {
            return s === 'critical' ? '#ef4444' : s === 'reduced' ? '#f59e0b' : '#22c55e';
        };

        window.timeColor = function(s) {
            return s === 'eol' ? '#f59e0b' : '#22c55e';
        };

        window.fmtDate = function(iso) {
            if (!iso) return '—';
            return new Date(iso).toLocaleString('en-US', {
                timeZone: 'UTC', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', hour12: false
            }) + ' EVE';
        };
    </script>
</body>
</html>
